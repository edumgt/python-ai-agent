<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>회원가입 | 금융 AI Agent</title>
  <link rel="icon" href="/favicon.ico" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    input, textarea, select { color: #f1f5f9 !important; }
    input::placeholder, textarea::placeholder { color: #64748b; }
  </style>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 flex items-center justify-center">
  <div class="w-full max-w-md px-6 py-12">
    <div class="text-center mb-8">
      <div class="text-3xl font-bold text-indigo-400">💹 금융 AI Agent</div>
    </div>
    <!-- Toast는 common.js setToast()가 body에 동적 생성 -->
    <div class="rounded-2xl border border-white/10 bg-white/5 p-8">
      <h1 class="text-xl font-semibold mb-6">회원가입</h1>
      <form id="f" class="space-y-4">
        <div>
          <label class="text-sm text-slate-400">이름</label>
          <input name="name" type="text" required class="mt-2 w-full px-4 py-3 rounded-xl bg-black/30 border border-white/10 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-100" placeholder="홍길동" />
        </div>
        <div>
          <label class="text-sm text-slate-400">이메일</label>
          <input name="email" type="email" required class="mt-2 w-full px-4 py-3 rounded-xl bg-black/30 border border-white/10 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-100" placeholder="you@example.com" />
        </div>
        <div>
          <label class="text-sm text-slate-400">비밀번호</label>
          <input name="password" type="password" required minlength="8" class="mt-2 w-full px-4 py-3 rounded-xl bg-black/30 border border-white/10 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-100" placeholder="8자 이상" />
        </div>
        <button type="submit" class="w-full py-3 rounded-xl bg-indigo-500 hover:bg-indigo-400 text-white font-semibold transition">가입하기</button>
      </form>
      <div class="mt-6 text-center text-sm text-slate-400">
        이미 계정이 있나요? <a class="text-indigo-400 hover:text-indigo-300" href="/login.html">로그인</a>
      </div>
    </div>
  </div>
  <script type="module">
    import { api, setToast } from "/js/common.js";
    document.getElementById("f").addEventListener("submit", async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      try {
        await api("/api/auth/register", { method: "POST", body: { name: fd.get("name"), email: fd.get("email"), password: fd.get("password") } });
        location.href = "/app.html";
      } catch (err) { setToast(err.message, "error"); }
    });
  </script>
</body>
</html>
