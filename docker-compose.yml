services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fin-ai-app
    ports:
    - 8966:8000
    env_file: .env
    environment:
    - MONGO_URI=mongodb://mongo:27017/fin_ai
    - REDIS_URL=redis://redis:6379
    extra_hosts:
    - host.docker.internal:host-gateway
    volumes:
    - app_data:/app/data
    - ./data:/app/data/csv:ro
    restart: unless-stopped
    networks:
    - shared-net
  ingest:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fin-ai-ingest
    env_file: .env
    environment:
    - MONGO_URI=mongodb://mongo:27017/fin_ai
    - REDIS_URL=redis://redis:6379
    extra_hosts:
    - host.docker.internal:host-gateway
    volumes:
    - app_data:/app/data
    - ./data:/app/data/csv:ro
    entrypoint:
    - python
    - -m
    - app.services.financial_ingest
    restart: 'no'
    networks:
    - shared-net
volumes:
  app_data: null
networks:
  shared-net:
    external: true
