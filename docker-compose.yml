services:
  # ─────────────────────────────
  # MongoDB – 사용자/인증 데이터
  # ─────────────────────────────
  mongo:
    image: 192.168.56.32/library/mongo:8.2.5
    container_name: mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: law_user
      MONGO_INITDB_ROOT_PASSWORD: law_pass
      MONGO_INITDB_DATABASE: law_rag
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  # ─────────────────────────────
  # Redis – 세션 스토어
  # ─────────────────────────────
  redis:
    image: 192.168.56.32/library/redis:8.6.1
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

  # ─────────────────────────────
  # Ollama – local LLM / embeddings
  # ─────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      # Windows Ollama 모델 폴더 직접 마운트 → 재다운로드 불필요
      - /mnt/c/Users/1/.ollama:/root/.ollama
    restart: unless-stopped

  # ─────────────────────────────
  # Qdrant – vector database
  # ─────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # ─────────────────────────────
  # Model pull (one-shot init)
  # ─────────────────────────────
  model-pull:
    image: ollama/ollama:latest
    container_name: model-pull
    depends_on:
      ollama:
        condition: service_started
    env_file: .env
    volumes:
      - /mnt/c/Users/1/.ollama:/root/.ollama
    entrypoint: >
      sh -c "
        ollama pull ${LLM_MODEL:-llama3.1} &&
        ollama pull ${EMBED_MODEL:-nomic-embed-text} &&
        echo 'Models ready.'
      "
    environment:
      - OLLAMA_HOST=http://ollama:11434
    restart: "no"

  # ─────────────────────────────
  # App – Node.js RAG API server
  # ─────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: law-rag-app
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - QDRANT_URL=http://qdrant:6333
      - VECTOR_STORE=${VECTOR_STORE:-sqlite}
      - MONGO_URI=mongodb://root:root-password@mongo:27017/law_rag?authSource=admin
      - REDIS_URL=redis://redis:6379
    volumes:
      - app_data:/app/data
    depends_on:
      - mongo
      - redis
      - ollama
      - qdrant
    restart: unless-stopped

  # ─────────────────────────────
  # Ingest job (one-shot)
  # Run manually: docker compose run --rm ingest
  # ─────────────────────────────
  ingest:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: law-rag-ingest
    env_file: .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - QDRANT_URL=http://qdrant:6333
      - VECTOR_STORE=${VECTOR_STORE:-sqlite}
      - MONGO_URI=mongodb://root:root-password@mongo:27017/law_rag?authSource=admin
      - REDIS_URL=redis://redis:6379
    volumes:
      - app_data:/app/data
      - ./Sample:/app/Sample:ro
    depends_on:
      - mongo
      - redis
      - ollama
      - qdrant
    entrypoint: ["node", "dist/src/cli/ingest_sample.js"]
    restart: "no"

volumes:
  mongo_data:
  redis_data:
  qdrant_data:
  app_data:
